<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Digestive Run 640</title>
  <style>
    :root {
      --bg-top: #ffd9a9;
      --bg-bottom: #ff8f6b;
      --frame: #4f1f26;
      --track: #f7b5bf;
      --track-edge: #6b2e44;
      --hud: #fff0da;
      --hud-text: #53222f;
      --spark: #ffe169;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 15% 10%, #ffe8cc 0%, var(--bg-top) 30%, var(--bg-bottom) 100%);
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 10px;
    }

    canvas {
      border: 3px solid var(--frame);
      border-radius: 16px;
      box-shadow: 0 22px 45px rgba(45, 11, 20, 0.35);
      touch-action: none;
      background: linear-gradient(180deg, #ffe8cc 0%, #ffcfbf 65%, #ffb49d 100%);
    }

    .badge {
      position: fixed;
      top: 8px;
      left: 10px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      color: #5f2f3d;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="badge">Mobile Concept • 360x640 Digestive Run</div>
  <div class="wrap">
    <canvas id="game"></canvas>
  </div>

  <script>
    (() => {
      const VIRTUAL_W = 360;
      const VIRTUAL_H = 640;
      const FOOD_SPAWN_MS = 800;
      const BASE_SPEED = 92;

      const canvas = document.getElementById("game");
      const badge = document.querySelector(".badge");
      const gl = canvas.getContext("webgl2", {
        alpha: true,
        antialias: false,
        depth: false,
        stencil: false,
        powerPreference: "high-performance"
      });

      const organs = [
        { name: "MOUTH", x: 180, y: 70 },
        { name: "ESOPHAGUS", x: 182, y: 145 },
        { name: "STOMACH", x: 242, y: 248 },
        { name: "DUODENUM", x: 248, y: 336 },
        { name: "SMALL INTESTINE", x: 176, y: 474 },
        { name: "LARGE INTESTINE", x: 188, y: 428 },
        { name: "RECTUM", x: 184, y: 603 }
      ];

      const pathPoints = [
        { x: 180, y: 0 },
        { x: 180, y: 40 },
        { x: 270, y: 80 },
        { x: 290, y: 120 },
        { x: 270, y: 160 },
        { x: 210, y: 160 },
        { x: 240, y: 120 },
        { x: 250, y: 40 },
        { x: 300, y: 40 },
        { x: 330, y: 120 },
        { x: 300, y: 200 },
        { x: 210, y: 200 },
        { x: 150, y: 160 },
        { x: 90, y: 160 },
        { x: 60, y: 200 },
        { x: 60, y: 280 },
        { x: 300, y: 280 },
        { x: 300, y: 320 },
        { x: 60, y: 320 },
        { x: 60, y: 520 },
        { x: 120, y: 520 },
        { x: 120, y: 360 },
        { x: 180, y: 360 },
        { x: 180, y: 520 },
        { x: 240, y: 520 },
        { x: 240, y: 360 },
        { x: 300, y: 360 },
        { x: 300, y: 560 },
        { x: 30, y: 560 },
        { x: 30, y: 240 },
        { x: 330, y: 240 },
        { x: 330, y: 600 },
        { x: 180, y: 600 },
        { x: 180, y: 630 }
      ];

      const segmentLengths = [];
      let totalPathLength = 0;
      for (let i = 0; i < pathPoints.length - 1; i += 1) {
        const a = pathPoints[i];
        const b = pathPoints[i + 1];
        const len = Math.hypot(b.x - a.x, b.y - a.y);
        segmentLengths.push(len);
        totalPathLength += len;
      }

      const foods = [];
      const foodTypes = [
        [0.99, 0.57, 0.38, 0.95],
        [0.94, 0.75, 0.32, 0.95],
        [0.93, 0.39, 0.32, 0.95],
        [0.98, 0.86, 0.50, 0.95],
        [0.40, 0.81, 0.77, 0.95],
        [0.71, 0.73, 0.94, 0.95]
      ];

      let spawnTimer = 0;
      let time = 0;
      let score = 0;
      let lastTime = 0;
      let scoreDirty = true;

      if (!gl) {
        const fallback = canvas.getContext("2d");
        fitCanvas(false);
        fallback.fillStyle = "#432";
        fallback.font = "bold 14px sans-serif";
        fallback.textAlign = "center";
        fallback.fillText("WebGL2 is required for this optimized renderer.", canvas.width / 2, canvas.height / 2);
        badge.textContent = "WebGL2 unavailable";
        return;
      }

      const renderer = createRenderer(gl);
      const staticMeshes = createStaticMeshes();
      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

      function fitCanvas(updateViewport = true) {
        const ww = window.innerWidth - 20;
        const wh = window.innerHeight - 20;
        const scale = Math.min(ww / VIRTUAL_W, wh / VIRTUAL_H);
        const cssW = Math.max(1, Math.round(VIRTUAL_W * scale));
        const cssH = Math.max(1, Math.round(VIRTUAL_H * scale));
        const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        canvas.style.width = `${cssW}px`;
        canvas.style.height = `${cssH}px`;
        canvas.width = Math.max(1, Math.round(cssW * dpr));
        canvas.height = Math.max(1, Math.round(cssH * dpr));
        if (updateViewport && gl) {
          gl.viewport(0, 0, canvas.width, canvas.height);
        }
      }

      function pickFood() {
        return foodTypes[Math.floor(Math.random() * foodTypes.length)];
      }

      function samplePath(distance) {
        let d = Math.max(0, Math.min(distance, totalPathLength));
        for (let i = 0; i < segmentLengths.length; i += 1) {
          const segLen = segmentLengths[i];
          if (d <= segLen) {
            const a = pathPoints[i];
            const b = pathPoints[i + 1];
            const t = segLen === 0 ? 0 : d / segLen;
            return {
              x: a.x + (b.x - a.x) * t,
              y: a.y + (b.y - a.y) * t
            };
          }
          d -= segLen;
        }
        const last = pathPoints[pathPoints.length - 1];
        return { x: last.x, y: last.y };
      }

      function spawnFood(initialOffset = 0) {
        foods.push({
          color: pickFood(),
          d: -initialOffset,
          speed: BASE_SPEED + Math.random() * 26,
          size: 17 + Math.random() * 4,
          spin: (Math.random() - 0.5) * 1.8
        });
      }

      function update(dt) {
        time += dt;
        spawnTimer += dt * 1000;

        while (spawnTimer >= FOOD_SPAWN_MS) {
          spawnFood();
          spawnTimer -= FOOD_SPAWN_MS;
        }

        for (let i = foods.length - 1; i >= 0; i -= 1) {
          const f = foods[i];
          f.d += f.speed * dt;
          if (f.d > totalPathLength + 25) {
            foods.splice(i, 1);
            score += 10;
            scoreDirty = true;
          }
        }
      }

      function draw() {
        gl.clearColor(1.0, 0.89, 0.80, 1.0);
        gl.clear(gl.COLOR_BUFFER_BIT);

        renderer.drawMesh(staticMeshes.bgWarm, [1.0, 0.72, 0.66, 0.24]);
        renderer.drawMesh(staticMeshes.bgCool, [1.0, 1.0, 1.0, 0.18]);

        renderer.drawMesh(staticMeshes.trackShadow, [0.25, 0.09, 0.14, 0.25]);
        renderer.drawMesh(staticMeshes.trackMain, [0.96, 0.66, 0.74, 0.95]);
        renderer.drawMesh(staticMeshes.trackEdge, [0.42, 0.18, 0.27, 0.9]);

        const flow = [];
        const spacing = 18;
        const offset = (time * 45) % spacing;
        for (let d = -offset; d < totalPathLength; d += spacing) {
          const p = samplePath(d);
          appendCircle(flow, p.x, p.y, 2.1, 8);
        }
        renderer.drawTriangles(flow, [1.0, 0.96, 0.83, 0.86]);

        renderer.drawMesh(staticMeshes.organs, [1.0, 1.0, 1.0, 0.58]);
        renderer.drawMesh(staticMeshes.topPanel, [1.0, 0.94, 0.85, 0.85]);
        renderer.drawMesh(staticMeshes.bottomPanel, [1.0, 0.94, 0.85, 0.88]);
        renderer.drawMesh(staticMeshes.panelEdgeTop, [0.31, 0.12, 0.15, 0.8]);
        renderer.drawMesh(staticMeshes.panelEdgeBottom, [0.31, 0.12, 0.15, 0.7]);

        for (let i = 0; i < foods.length; i += 1) {
          const f = foods[i];
          const p = samplePath(f.d);
          const pulse = 1 + Math.sin((time * 8) + f.d * 0.08 + f.spin) * 0.08;
          const halo = [];
          appendCircle(halo, p.x, p.y, f.size * 0.98 * pulse, 14);
          renderer.drawTriangles(halo, [1.0, 0.88, 0.46, 0.28]);

          const core = [];
          appendCircle(core, p.x, p.y, f.size * 0.72 * pulse, 14);
          renderer.drawTriangles(core, f.color);
        }

        if (scoreDirty) {
          badge.textContent = `WebGL2 Optimized • SCORE ${String(score).padStart(4, "0")}`;
          scoreDirty = false;
        }
      }

      function frame(now) {
        if (!lastTime) lastTime = now;
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;

        update(dt);
        draw();
        requestAnimationFrame(frame);
      }

      fitCanvas();
      window.addEventListener("resize", fitCanvas);

      for (let i = 0; i < 5; i += 1) {
        spawnFood(i * 56);
      }

      requestAnimationFrame(frame);

      function createStaticMeshes() {
        const bgWarm = [];
        const bgCool = [];
        for (let i = 0; i < 18; i += 1) {
          const x = (i * 43 + 17) % VIRTUAL_W;
          const y = (i * 71 + 93) % VIRTUAL_H;
          const r = 6 + (i % 4);
          if (i % 2) {
            appendCircle(bgCool, x, y, r, 12);
          } else {
            appendCircle(bgWarm, x, y, r, 12);
          }
        }

        const organMesh = [];
        for (let i = 0; i < organs.length; i += 1) {
          appendCircle(organMesh, organs[i].x, organs[i].y, 11, 14);
        }

        const topPanel = [];
        appendRect(topPanel, 14, 14, 332, 50);
        const bottomPanel = [];
        appendRect(bottomPanel, 24, 594, 312, 30);

        const panelEdgeTop = buildPolylineMesh([
          { x: 14, y: 14 }, { x: 346, y: 14 }, { x: 346, y: 64 }, { x: 14, y: 64 }, { x: 14, y: 14 }
        ], 2.0);
        const panelEdgeBottom = buildPolylineMesh([
          { x: 24, y: 594 }, { x: 336, y: 594 }, { x: 336, y: 624 }, { x: 24, y: 624 }, { x: 24, y: 594 }
        ], 1.6);

        return {
          bgWarm: renderer.createMesh(bgWarm),
          bgCool: renderer.createMesh(bgCool),
          trackShadow: renderer.createMesh(buildPolylineMesh(pathPoints, 42, 2, 3)),
          trackMain: renderer.createMesh(buildPolylineMesh(pathPoints, 34, 0, 0)),
          trackEdge: renderer.createMesh(buildPolylineMesh(pathPoints, 5, 0, 0)),
          organs: renderer.createMesh(organMesh),
          topPanel: renderer.createMesh(topPanel),
          bottomPanel: renderer.createMesh(bottomPanel),
          panelEdgeTop: renderer.createMesh(panelEdgeTop),
          panelEdgeBottom: renderer.createMesh(panelEdgeBottom)
        };
      }

      function appendRect(out, x, y, w, h) {
        out.push(
          x, y, x + w, y, x, y + h,
          x + w, y, x + w, y + h, x, y + h
        );
      }

      function appendCircle(out, cx, cy, r, seg = 12) {
        const step = (Math.PI * 2) / seg;
        for (let i = 0; i < seg; i += 1) {
          const a0 = i * step;
          const a1 = (i + 1) * step;
          out.push(
            cx, cy,
            cx + Math.cos(a0) * r, cy + Math.sin(a0) * r,
            cx + Math.cos(a1) * r, cy + Math.sin(a1) * r
          );
        }
      }

      function buildPolylineMesh(points, width, offsetX = 0, offsetY = 0) {
        const out = [];
        const half = width * 0.5;

        for (let i = 0; i < points.length - 1; i += 1) {
          const ax = points[i].x + offsetX;
          const ay = points[i].y + offsetY;
          const bx = points[i + 1].x + offsetX;
          const by = points[i + 1].y + offsetY;
          const dx = bx - ax;
          const dy = by - ay;
          const len = Math.hypot(dx, dy);
          if (len < 0.001) continue;
          const nx = (-dy / len) * half;
          const ny = (dx / len) * half;
          out.push(
            ax + nx, ay + ny,
            ax - nx, ay - ny,
            bx + nx, by + ny,
            ax - nx, ay - ny,
            bx - nx, by - ny,
            bx + nx, by + ny
          );
        }

        for (let i = 0; i < points.length; i += 1) {
          appendCircle(out, points[i].x + offsetX, points[i].y + offsetY, half, 14);
        }

        return out;
      }

      function createRenderer(glCtx) {
        const vs = `#version 300 es
          in vec2 aPosition;
          uniform vec2 uResolution;
          void main() {
            vec2 zeroToOne = aPosition / uResolution;
            vec2 clip = zeroToOne * 2.0 - 1.0;
            gl_Position = vec4(clip * vec2(1.0, -1.0), 0.0, 1.0);
          }
        `;

        const fs = `#version 300 es
          precision highp float;
          uniform vec4 uColor;
          out vec4 outColor;
          void main() {
            outColor = uColor;
          }
        `;

        const program = createProgram(glCtx, vs, fs);
        const aPosition = glCtx.getAttribLocation(program, "aPosition");
        const uResolution = glCtx.getUniformLocation(program, "uResolution");
        const uColor = glCtx.getUniformLocation(program, "uColor");
        const vao = glCtx.createVertexArray();
        const dynamicBuffer = glCtx.createBuffer();
        glCtx.bindVertexArray(vao);
        glCtx.enableVertexAttribArray(aPosition);
        glCtx.useProgram(program);
        glCtx.uniform2f(uResolution, VIRTUAL_W, VIRTUAL_H);

        function bindBuffer(buffer) {
          glCtx.bindBuffer(glCtx.ARRAY_BUFFER, buffer);
          glCtx.vertexAttribPointer(aPosition, 2, glCtx.FLOAT, false, 0, 0);
        }

        return {
          createMesh(vertices) {
            const mesh = {
              buffer: glCtx.createBuffer(),
              count: Math.floor(vertices.length / 2)
            };
            bindBuffer(mesh.buffer);
            glCtx.bufferData(glCtx.ARRAY_BUFFER, new Float32Array(vertices), glCtx.STATIC_DRAW);
            return mesh;
          },
          drawMesh(mesh, color) {
            if (!mesh || mesh.count === 0) return;
            glCtx.useProgram(program);
            glCtx.bindVertexArray(vao);
            bindBuffer(mesh.buffer);
            glCtx.uniform4f(uColor, color[0], color[1], color[2], color[3]);
            glCtx.drawArrays(glCtx.TRIANGLES, 0, mesh.count);
          },
          drawTriangles(vertices, color) {
            if (!vertices || vertices.length === 0) return;
            bindBuffer(dynamicBuffer);
            glCtx.bufferData(glCtx.ARRAY_BUFFER, new Float32Array(vertices), glCtx.STREAM_DRAW);
            glCtx.useProgram(program);
            glCtx.bindVertexArray(vao);
            glCtx.uniform4f(uColor, color[0], color[1], color[2], color[3]);
            glCtx.drawArrays(glCtx.TRIANGLES, 0, Math.floor(vertices.length / 2));
          }
        };
      }

      function createShader(glCtx, type, source) {
        const shader = glCtx.createShader(type);
        glCtx.shaderSource(shader, source);
        glCtx.compileShader(shader);
        if (!glCtx.getShaderParameter(shader, glCtx.COMPILE_STATUS)) {
          const error = glCtx.getShaderInfoLog(shader);
          glCtx.deleteShader(shader);
          throw new Error(error || "Shader compile failed");
        }
        return shader;
      }

      function createProgram(glCtx, vs, fs) {
        const vert = createShader(glCtx, glCtx.VERTEX_SHADER, vs);
        const frag = createShader(glCtx, glCtx.FRAGMENT_SHADER, fs);
        const program = glCtx.createProgram();
        glCtx.attachShader(program, vert);
        glCtx.attachShader(program, frag);
        glCtx.linkProgram(program);
        glCtx.deleteShader(vert);
        glCtx.deleteShader(frag);
        if (!glCtx.getProgramParameter(program, glCtx.LINK_STATUS)) {
          const error = glCtx.getProgramInfoLog(program);
          glCtx.deleteProgram(program);
          throw new Error(error || "Program link failed");
        }
        return program;
      }
    })();
  </script>
</body>
</html>
