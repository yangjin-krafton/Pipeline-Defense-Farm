<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upgrade Tree UI Demo</title>
  <link rel="stylesheet" href="../src/styles/themes/splatoon.css">
  <link rel="stylesheet" href="../src/styles/components/upgrade-tree.css">
  <style>
    body {
      font-family: 'Arial Black', 'Arial Rounded MT Bold', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
      color: #fff;
      padding: 40px;
      min-height: 100vh;
    }

    .demo-container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 36px;
      margin-bottom: 40px;
      text-shadow:
        3px 3px 0 #e94560,
        -2px -2px 0 #00d9ff;
    }

    .demo-section {
      margin-bottom: 60px;
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 20px;
      border: 3px solid #00d9ff;
    }

    .demo-section h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #ffd700;
      text-shadow: 2px 2px 0 #e94560;
    }

    /* 업그레이드 블록 스타일 */
    .upgrade-block {
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 5px solid #1a1a2e;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 0 0 3px #ffd700,
                  0 8px 0 #1a1a2e,
                  0 12px 30px rgba(255, 215, 0, 0.4);
    }

    .upgrade-header h3 {
      font-size: 20px;
      margin-bottom: 15px;
      color: #fff;
      text-shadow:
        2px 2px 0 #e94560,
        -1px -1px 0 #00d9ff;
    }

    .upgrade-content {
      /* 업그레이드 트리가 여기에 삽입됨 */
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 900;
      border: 3px solid #1a1a2e;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Arial Black', sans-serif;
      box-shadow: 0 4px 0 #1a1a2e;
      position: relative;
      top: 0;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .btn:active {
      top: 2px;
      box-shadow: 0 2px 0 #1a1a2e;
    }

    .btn-primary {
      background: linear-gradient(135deg, #00d9ff, #00b4d8);
      color: #fff;
      text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.5);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #e94560, #ff6b9d);
      color: #fff;
      text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.5);
    }

    .btn-success {
      background: linear-gradient(135deg, #ffd700, #ffa500);
      color: #1a1a2e;
      text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.5);
    }

    .log {
      background: rgba(0, 0, 0, 0.3);
      border: 2px solid #00d9ff;
      border-radius: 10px;
      padding: 15px;
      margin-top: 20px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      color: #00d9ff;
    }

    .log-entry {
      margin-bottom: 5px;
    }

    .log-entry.success {
      color: #00ff00;
    }

    .log-entry.error {
      color: #ff6b9d;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <h1>🎮 Upgrade Tree UI Demo</h1>

    <!-- Demo 1: 기본 선형 트리 -->
    <div class="demo-section">
      <h2>📊 Demo 1: 기본 선형 업그레이드 트리</h2>
      <div class="controls">
        <button class="btn btn-primary" onclick="demo1.init()">초기화</button>
        <button class="btn btn-success" onclick="demo1.upgrade()">업그레이드 (Lv 4)</button>
        <button class="btn btn-secondary" onclick="demo1.reset()">리셋 (Lv 1)</button>
      </div>
      <div class="upgrade-block">
        <div class="upgrade-header">
          <h3>💥 업그레이드 트리</h3>
        </div>
        <div class="upgrade-content" id="demo1-container">
        </div>
      </div>
      <div class="log" id="demo1-log"></div>
    </div>

    <!-- Demo 2: 분기형 트리 -->
    <div class="demo-section">
      <h2>🌳 Demo 2: 분기형 업그레이드 트리</h2>
      <div class="controls">
        <button class="btn btn-primary" onclick="demo2.init()">초기화</button>
        <button class="btn btn-success" onclick="demo2.unlockBranch('speed')">속도 업그레이드 해제</button>
        <button class="btn btn-success" onclick="demo2.unlockBranch('range')">범위 업그레이드 해제</button>
      </div>
      <div class="upgrade-block">
        <div class="upgrade-header">
          <h3>💥 업그레이드 트리 (분기)</h3>
        </div>
        <div class="upgrade-content" id="demo2-container">
        </div>
      </div>
      <div class="log" id="demo2-log"></div>
    </div>

    <!-- Demo 3: 커스텀 트리 -->
    <div class="demo-section">
      <h2>⚡ Demo 3: 완전 커스텀 트리</h2>
      <div class="controls">
        <button class="btn btn-primary" onclick="demo3.init()">초기화</button>
        <button class="btn btn-success" onclick="demo3.updateNode()">랜덤 노드 업데이트</button>
      </div>
      <div class="upgrade-block">
        <div class="upgrade-header">
          <h3>💥 커스텀 트리</h3>
        </div>
        <div class="upgrade-content" id="demo3-container">
        </div>
      </div>
      <div class="log" id="demo3-log"></div>
    </div>
  </div>

  <script type="module">
    import { UpgradeTreeUI, createDefaultUpgradeTree, createBranchedUpgradeTree } from '../src/js/ui/UpgradeTreeUI.js';

    // Demo 1: 기본 선형 트리
    window.demo1 = {
      ui: null,
      currentLevel: 3,

      init() {
        const container = document.getElementById('demo1-container');
        const treeData = createDefaultUpgradeTree(5, this.currentLevel);

        this.ui = new UpgradeTreeUI(container, treeData, (nodeData) => {
          this.log(`노드 클릭: ${nodeData.name} (상태: ${nodeData.state})`);
          if (nodeData.state === 'available') {
            this.log(`업그레이드 가능! 비용: ${nodeData.cost}`, 'success');
          }
        });

        this.log('기본 트리 초기화 완료 (현재 레벨: ' + this.currentLevel + ')');
      },

      upgrade() {
        if (this.currentLevel < 5) {
          this.currentLevel++;
          this.init();
          this.log(`레벨 업! 현재 레벨: ${this.currentLevel}`, 'success');
        } else {
          this.log('최대 레벨에 도달했습니다', 'error');
        }
      },

      reset() {
        this.currentLevel = 1;
        this.init();
        this.log('레벨 1로 리셋됨', 'success');
      },

      log(message, type = 'info') {
        const logDiv = document.getElementById('demo1-log');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
      }
    };

    // Demo 2: 분기형 트리
    window.demo2 = {
      ui: null,
      branches: {
        speed: 'locked',
        range: 'locked'
      },

      init() {
        const container = document.getElementById('demo2-container');
        const treeData = createBranchedUpgradeTree({
          mainPath: 5,
          currentLevel: 3,
          branches: [
            {
              id: 'speed_upgrade',
              name: '속도↑',
              icon: '⏱️',
              fromLevel: 4,
              offset: -40,
              state: this.branches.speed,
              cost: '⚡ 40'
            },
            {
              id: 'range_upgrade',
              name: '범위↑',
              icon: '📍',
              fromLevel: 4,
              offset: 40,
              state: this.branches.range,
              cost: '🍎 400'
            }
          ]
        });

        this.ui = new UpgradeTreeUI(container, treeData, (nodeData) => {
          this.log(`노드 클릭: ${nodeData.name} (상태: ${nodeData.state})`);
        });

        this.log('분기형 트리 초기화 완료');
      },

      unlockBranch(branch) {
        if (this.branches[branch] === 'locked') {
          this.branches[branch] = 'available';
          this.init();
          this.log(`${branch} 업그레이드가 사용 가능해졌습니다!`, 'success');
        } else {
          this.log(`${branch} 업그레이드는 이미 해제되었습니다`, 'error');
        }
      },

      log(message, type = 'info') {
        const logDiv = document.getElementById('demo2-log');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
      }
    };

    // Demo 3: 커스텀 트리
    window.demo3 = {
      ui: null,

      init() {
        const container = document.getElementById('demo3-container');
        const customTreeData = {
          width: 700,
          height: 200,
          nodes: [
            { id: 'start', name: '시작', icon: '🚀', x: 50, y: 100, state: 'unlocked' },
            { id: 'branch1', name: '경로 A', icon: '⚡', x: 200, y: 60, state: 'available', cost: '🍎 100' },
            { id: 'branch2', name: '경로 B', icon: '🔥', x: 200, y: 140, state: 'available', cost: '🍎 150' },
            { id: 'merge1', name: '강화 1', icon: '💪', x: 350, y: 60, state: 'locked', cost: '⚡ 50' },
            { id: 'merge2', name: '강화 2', icon: '🛡️', x: 350, y: 140, state: 'locked', cost: '⚡ 50' },
            { id: 'final', name: '최종', icon: '💎', x: 500, y: 100, state: 'locked', cost: '🦠 100' }
          ],
          connections: [
            { x1: 90, y1: 100, x2: 160, y2: 80, state: 'available' },
            { x1: 90, y1: 100, x2: 160, y2: 140, state: 'available' },
            { x1: 240, y1: 80, x2: 310, y2: 80, state: 'locked' },
            { x1: 240, y1: 140, x2: 310, y2: 140, state: 'locked' },
            { x1: 390, y1: 80, x2: 460, y2: 100, state: 'locked' },
            { x1: 390, y1: 140, x2: 460, y2: 100, state: 'locked' }
          ]
        };

        this.ui = new UpgradeTreeUI(container, customTreeData, (nodeData) => {
          this.log(`노드 클릭: ${nodeData.name} (${nodeData.id})`);
        });

        this.log('커스텀 트리 초기화 완료');
      },

      updateNode() {
        const nodes = ['branch1', 'branch2', 'merge1', 'merge2', 'final'];
        const states = ['unlocked', 'available', 'current', 'locked'];
        const randomNode = nodes[Math.floor(Math.random() * nodes.length)];
        const randomState = states[Math.floor(Math.random() * states.length)];

        this.ui.updateNode(randomNode, { state: randomState });
        this.log(`노드 ${randomNode}의 상태를 ${randomState}로 변경`, 'success');
      },

      log(message, type = 'info') {
        const logDiv = document.getElementById('demo3-log');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
      }
    };

    // 초기화
    demo1.init();
    demo2.init();
    demo3.init();
  </script>
</body>
</html>
