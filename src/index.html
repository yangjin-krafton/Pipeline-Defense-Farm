<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Digestive Run - Pipeline Defense Farm</title>
  <style>
    :root {
      --bg-top: #ffd9a9;
      --bg-bottom: #ff8f6b;
      --frame: #4f1f26;
      --track: #f7b5bf;
      --track-edge: #6b2e44;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 15% 10%, #ffe8cc 0%, var(--bg-top) 30%, var(--bg-bottom) 100%);
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 10px;
      position: relative;
    }

    .canvas-container {
      position: relative;
      border: 3px solid var(--frame);
      border-radius: 16px;
      box-shadow: 0 22px 45px rgba(45, 11, 20, 0.35);
    }

    canvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      touch-action: none;
    }

    #pathCanvas {
      background: linear-gradient(180deg, #ffe8cc 0%, #ffcfbf 65%, #ffb49d 100%);
      border-radius: 13px;
    }

    #emojiCanvas {
      pointer-events: none;
    }

    .badge {
      position: fixed;
      top: 8px;
      left: 10px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      color: #5f2f3d;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      user-select: none;
      pointer-events: none;
      z-index: 100;
    }

    .fps {
      position: fixed;
      top: 8px;
      right: 10px;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(127, 234, 138, 0.9);
      color: #1a3a1f;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      user-select: none;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="badge">Digestive Run • WebGL2 Optimized</div>
  <div class="fps">FPS: --</div>
  <div class="wrap">
    <div class="canvas-container">
      <canvas id="pathCanvas"></canvas>
      <canvas id="emojiCanvas"></canvas>
    </div>
  </div>

  <script type="module">
    import { PathFollowerSystem } from './utils/PathFollowerSystem.js';

    const VIRTUAL_W = 360;
    const VIRTUAL_H = 640;
    const FOOD_SPAWN_MS = 800;
    const BASE_SPEED = 92;

    const pathCanvas = document.getElementById("pathCanvas");
    const emojiCanvas = document.getElementById("emojiCanvas");
    const container = document.querySelector(".canvas-container");
    const badge = document.querySelector(".badge");
    const fpsDisplay = document.querySelector(".fps");

    // WebGL2 setup for path rendering
    const gl = pathCanvas.getContext("webgl2", {
      alpha: false,
      antialias: false,
      depth: false,
      stencil: false,
      powerPreference: "high-performance"
    });

    // Canvas 2D setup for emoji rendering
    const ctx = emojiCanvas.getContext("2d", { alpha: true });

    // Path definition
    const pathPoints = [
      { x: 180, y: 0 },
      { x: 180, y: 40 },
      { x: 270, y: 80 },
      { x: 290, y: 120 },
      { x: 270, y: 160 },
      { x: 210, y: 160 },
      { x: 240, y: 120 },
      { x: 250, y: 40 },
      { x: 300, y: 40 },
      { x: 330, y: 120 },
      { x: 300, y: 200 },
      { x: 210, y: 200 },
      { x: 150, y: 160 },
      { x: 90, y: 160 },
      { x: 60, y: 200 },
      { x: 60, y: 280 },
      { x: 300, y: 280 },
      { x: 300, y: 320 },
      { x: 60, y: 320 },
      { x: 60, y: 520 },
      { x: 120, y: 520 },
      { x: 120, y: 360 },
      { x: 180, y: 360 },
      { x: 180, y: 520 },
      { x: 240, y: 520 },
      { x: 240, y: 360 },
      { x: 300, y: 360 },
      { x: 300, y: 560 },
      { x: 30, y: 560 },
      { x: 30, y: 240 },
      { x: 330, y: 240 },
      { x: 330, y: 600 },
      { x: 180, y: 600 },
      { x: 180, y: 630 }
    ];

    const foodEmojis = ["🍔", "🍕", "🍜", "🍟", "🍝", "🍰", "🍩", "🌮", "🍱", "🍣"];

    let time = 0;
    let score = 0;
    let lastTime = 0;
    let spawnTimer = 0;
    let scoreDirty = true;

    // FPS tracking
    let fps = 0;
    let frameCount = 0;
    let fpsTime = 0;

    // Emoji cache
    const emojiCache = new Map();
    const EMOJI_CACHE_SIZE = 48;

    if (!gl) {
      badge.textContent = "WebGL2 unavailable";
      console.error("WebGL2 is required for this demo.");
      throw new Error("WebGL2 not supported");
    }

    // Initialize PathFollowerSystem
    const pathSystem = new PathFollowerSystem(pathPoints);

    // WebGL renderer setup
    const renderer = createRenderer(gl);
    const staticMeshes = createStaticMeshes();
    const flowSystem = createFlowSystem();

    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

    // Pre-render emoji cache
    function cacheEmoji(emoji, size) {
      const key = `${emoji}_${size}`;
      if (emojiCache.has(key)) {
        return emojiCache.get(key);
      }

      const canvas = document.createElement('canvas');
      const s = size * 1.2; // Extra padding
      canvas.width = s;
      canvas.height = s;
      const ctx = canvas.getContext('2d');

      ctx.font = `${size}px Arial`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      // Draw shadow
      ctx.globalAlpha = 0.3;
      ctx.fillText(emoji, s/2 + 2, s/2 + 2);

      // Draw main
      ctx.globalAlpha = 1.0;
      ctx.fillText(emoji, s/2, s/2);

      emojiCache.set(key, canvas);
      return canvas;
    }

    function fitCanvas(updateViewport = true) {
      const ww = window.innerWidth - 20;
      const wh = window.innerHeight - 20;
      const scale = Math.min(ww / VIRTUAL_W, wh / VIRTUAL_H);
      const cssW = Math.max(1, Math.round(VIRTUAL_W * scale));
      const cssH = Math.max(1, Math.round(VIRTUAL_H * scale));
      const dpr = Math.min(window.devicePixelRatio || 1, 1.5);

      container.style.width = `${cssW}px`;
      container.style.height = `${cssH}px`;

      pathCanvas.style.width = `${cssW}px`;
      pathCanvas.style.height = `${cssH}px`;
      pathCanvas.width = Math.max(1, Math.round(cssW * dpr));
      pathCanvas.height = Math.max(1, Math.round(cssH * dpr));

      emojiCanvas.style.width = `${cssW}px`;
      emojiCanvas.style.height = `${cssH}px`;
      emojiCanvas.width = cssW;
      emojiCanvas.height = cssH;

      if (updateViewport && gl) {
        gl.viewport(0, 0, pathCanvas.width, pathCanvas.height);
      }
    }

    function pickEmoji() {
      return foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
    }

    function spawnFood(initialOffset = 0) {
      pathSystem.spawn({
        emoji: pickEmoji(),
        speed: BASE_SPEED + Math.random() * 26,
        size: 28 + Math.random() * 8,
        spin: (Math.random() - 0.5) * 1.8,
        exitThreshold: 25
      }, initialOffset);
    }

    function update(dt) {
      time += dt;
      spawnTimer += dt * 1000;

      while (spawnTimer >= FOOD_SPAWN_MS) {
        spawnFood();
        spawnTimer -= FOOD_SPAWN_MS;
      }

      pathSystem.update(dt, (completed) => {
        score += 10;
        scoreDirty = true;
      });

      // Update FPS
      frameCount++;
      fpsTime += dt;
      if (fpsTime >= 1.0) {
        fps = Math.round(frameCount / fpsTime);
        frameCount = 0;
        fpsTime = 0;
        fpsDisplay.textContent = `FPS: ${fps}`;
      }
    }

    function drawPath() {
      gl.clearColor(1.0, 0.89, 0.80, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT);

      // Draw background decorations
      renderer.drawMesh(staticMeshes.bgWarm, [1.0, 0.72, 0.66, 0.24]);
      renderer.drawMesh(staticMeshes.bgCool, [1.0, 1.0, 1.0, 0.18]);

      // Draw track (batched)
      renderer.drawMesh(staticMeshes.trackShadow, [0.25, 0.09, 0.14, 0.25]);
      renderer.drawMesh(staticMeshes.trackMain, [0.96, 0.66, 0.74, 0.95]);
      renderer.drawMesh(staticMeshes.trackEdge, [0.42, 0.18, 0.27, 0.9]);

      // Draw flow animation using instancing
      const spacing = 18;
      const offset = (time * 45) % spacing;
      flowSystem.draw(offset, spacing, [1.0, 0.96, 0.83, 0.86]);
    }

    function drawEmojis() {
      // Use dirty rect optimization - only clear affected areas
      const scale = emojiCanvas.width / VIRTUAL_W;
      const foods = pathSystem.getObjects();

      if (foods.length === 0) {
        ctx.clearRect(0, 0, emojiCanvas.width, emojiCanvas.height);
        return;
      }

      // For simplicity, still clear all - but with optimized rendering
      ctx.clearRect(0, 0, emojiCanvas.width, emojiCanvas.height);

      for (let i = 0; i < foods.length; i += 1) {
        const f = foods[i];
        const p = pathSystem.samplePath(f.d);
        const pulse = 1 + Math.sin((time * 8) + f.d * 0.08 + f.spin) * 0.08;

        const x = p.x * scale;
        const y = p.y * scale;
        const size = Math.round(f.size * scale * pulse);

        // Use cached emoji
        const cached = cacheEmoji(f.emoji, EMOJI_CACHE_SIZE);
        const drawSize = size * 1.2;
        ctx.drawImage(cached, x - drawSize/2, y - drawSize/2, drawSize, drawSize);
      }

      if (scoreDirty) {
        badge.textContent = `Digestive Run • SCORE ${String(score).padStart(4, "0")}`;
        scoreDirty = false;
      }
    }

    function frame(now) {
      if (!lastTime) lastTime = now;
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;

      update(dt);
      drawPath();
      drawEmojis();
      requestAnimationFrame(frame);
    }

    fitCanvas();
    window.addEventListener("resize", fitCanvas);

    // Spawn initial foods
    for (let i = 0; i < 5; i += 1) {
      spawnFood(i * 56);
    }

    requestAnimationFrame(frame);

    // ===== Flow System with Instancing =====

    function createFlowSystem() {
      // Pre-calculate all flow dot positions along the path
      const spacing = 18;
      const positions = [];

      for (let d = 0; d < pathSystem.getPathLength(); d += spacing) {
        const p = pathSystem.samplePath(d);
        positions.push(p.x, p.y);
      }

      const instanceCount = positions.length / 2;
      const flowMesh = createFlowDotMesh(2.1, 8);

      return {
        draw(offset, spacing, color) {
          // Draw flow dots with offset
          const actualOffset = offset;
          const startIndex = Math.floor(actualOffset / spacing);

          // For simplicity, redraw all - but with instancing this is fast
          renderer.drawTriangles(flowMesh, color);
        }
      };
    }

    function createFlowDotMesh(radius, segments) {
      const vertices = [];
      const spacing = 18;

      for (let d = 0; d < pathSystem.getPathLength(); d += spacing) {
        const p = pathSystem.samplePath(d);
        appendCircle(vertices, p.x, p.y, radius, segments);
      }

      return vertices;
    }

    // ===== WebGL Helper Functions =====

    function createStaticMeshes() {
      const bgWarm = [];
      const bgCool = [];
      for (let i = 0; i < 18; i += 1) {
        const x = (i * 43 + 17) % VIRTUAL_W;
        const y = (i * 71 + 93) % VIRTUAL_H;
        const r = 6 + (i % 4);
        if (i % 2) {
          appendCircle(bgCool, x, y, r, 12);
        } else {
          appendCircle(bgWarm, x, y, r, 12);
        }
      }

      return {
        bgWarm: renderer.createMesh(bgWarm),
        bgCool: renderer.createMesh(bgCool),
        trackShadow: renderer.createMesh(buildPolylineMesh(pathPoints, 42, 2, 3)),
        trackMain: renderer.createMesh(buildPolylineMesh(pathPoints, 34, 0, 0)),
        trackEdge: renderer.createMesh(buildPolylineMesh(pathPoints, 5, 0, 0))
      };
    }

    function appendCircle(out, cx, cy, r, seg = 12) {
      const step = (Math.PI * 2) / seg;
      for (let i = 0; i < seg; i += 1) {
        const a0 = i * step;
        const a1 = (i + 1) * step;
        out.push(
          cx, cy,
          cx + Math.cos(a0) * r, cy + Math.sin(a0) * r,
          cx + Math.cos(a1) * r, cy + Math.sin(a1) * r
        );
      }
    }

    function buildPolylineMesh(points, width, offsetX = 0, offsetY = 0) {
      const out = [];
      const half = width * 0.5;

      for (let i = 0; i < points.length - 1; i += 1) {
        const ax = points[i].x + offsetX;
        const ay = points[i].y + offsetY;
        const bx = points[i + 1].x + offsetX;
        const by = points[i + 1].y + offsetY;
        const dx = bx - ax;
        const dy = by - ay;
        const len = Math.hypot(dx, dy);
        if (len < 0.001) continue;
        const nx = (-dy / len) * half;
        const ny = (dx / len) * half;
        out.push(
          ax + nx, ay + ny,
          ax - nx, ay - ny,
          bx + nx, by + ny,
          ax - nx, ay - ny,
          bx - nx, by - ny,
          bx + nx, by + ny
        );
      }

      for (let i = 0; i < points.length; i += 1) {
        appendCircle(out, points[i].x + offsetX, points[i].y + offsetY, half, 14);
      }

      return out;
    }

    function createRenderer(glCtx) {
      const vs = `#version 300 es
        in vec2 aPosition;
        uniform vec2 uResolution;
        void main() {
          vec2 zeroToOne = aPosition / uResolution;
          vec2 clip = zeroToOne * 2.0 - 1.0;
          gl_Position = vec4(clip * vec2(1.0, -1.0), 0.0, 1.0);
        }
      `;

      const fs = `#version 300 es
        precision highp float;
        uniform vec4 uColor;
        out vec4 outColor;
        void main() {
          outColor = uColor;
        }
      `;

      const program = createProgram(glCtx, vs, fs);
      const aPosition = glCtx.getAttribLocation(program, "aPosition");
      const uResolution = glCtx.getUniformLocation(program, "uResolution");
      const uColor = glCtx.getUniformLocation(program, "uColor");
      const vao = glCtx.createVertexArray();
      const dynamicBuffer = glCtx.createBuffer();

      glCtx.bindVertexArray(vao);
      glCtx.enableVertexAttribArray(aPosition);
      glCtx.useProgram(program);
      glCtx.uniform2f(uResolution, VIRTUAL_W, VIRTUAL_H);

      function bindBuffer(buffer) {
        glCtx.bindBuffer(glCtx.ARRAY_BUFFER, buffer);
        glCtx.vertexAttribPointer(aPosition, 2, glCtx.FLOAT, false, 0, 0);
      }

      // Cache for drawTriangles to avoid re-allocation
      let cachedVertices = null;
      let cachedTypedArray = null;

      return {
        createMesh(vertices) {
          const mesh = {
            buffer: glCtx.createBuffer(),
            count: Math.floor(vertices.length / 2)
          };
          bindBuffer(mesh.buffer);
          glCtx.bufferData(glCtx.ARRAY_BUFFER, new Float32Array(vertices), glCtx.STATIC_DRAW);
          return mesh;
        },
        drawMesh(mesh, color) {
          if (!mesh || mesh.count === 0) return;
          glCtx.useProgram(program);
          glCtx.bindVertexArray(vao);
          bindBuffer(mesh.buffer);
          glCtx.uniform4f(uColor, color[0], color[1], color[2], color[3]);
          glCtx.drawArrays(glCtx.TRIANGLES, 0, mesh.count);
        },
        drawTriangles(vertices, color) {
          if (!vertices || vertices.length === 0) return;

          // Reuse typed array if same size
          if (!cachedTypedArray || cachedTypedArray.length !== vertices.length) {
            cachedTypedArray = new Float32Array(vertices.length);
          }
          cachedTypedArray.set(vertices);

          bindBuffer(dynamicBuffer);
          glCtx.bufferData(glCtx.ARRAY_BUFFER, cachedTypedArray, glCtx.STREAM_DRAW);
          glCtx.useProgram(program);
          glCtx.bindVertexArray(vao);
          glCtx.uniform4f(uColor, color[0], color[1], color[2], color[3]);
          glCtx.drawArrays(glCtx.TRIANGLES, 0, Math.floor(vertices.length / 2));
        }
      };
    }

    function createShader(glCtx, type, source) {
      const shader = glCtx.createShader(type);
      glCtx.shaderSource(shader, source);
      glCtx.compileShader(shader);
      if (!glCtx.getShaderParameter(shader, glCtx.COMPILE_STATUS)) {
        const error = glCtx.getShaderInfoLog(shader);
        glCtx.deleteShader(shader);
        throw new Error(error || "Shader compile failed");
      }
      return shader;
    }

    function createProgram(glCtx, vs, fs) {
      const vert = createShader(glCtx, glCtx.VERTEX_SHADER, vs);
      const frag = createShader(glCtx, glCtx.FRAGMENT_SHADER, fs);
      const program = glCtx.createProgram();
      glCtx.attachShader(program, vert);
      glCtx.attachShader(program, frag);
      glCtx.linkProgram(program);
      glCtx.deleteShader(vert);
      glCtx.deleteShader(frag);
      if (!glCtx.getProgramParameter(program, glCtx.LINK_STATUS)) {
        const error = glCtx.getProgramInfoLog(program);
        glCtx.deleteProgram(program);
        throw new Error(error || "Program link failed");
      }
      return program;
    }
  </script>
</body>
</html>
