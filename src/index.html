<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Digestive Run - Pipeline Defense Farm</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <!-- Start Overlay for autoplay -->
  <div class="start-overlay" id="startOverlay">
    <div class="start-content">
      <h1>🍔 Digestive Run 🍕</h1>
      <p>음식이 소화되는 여정을 따라가세요!</p>
      <button class="start-btn" id="startBtn">게임 시작</button>
      <div class="start-hint">클릭하여 음악과 함께 시작하세요</div>
    </div>
  </div>

  <!-- 스케일 컨테이너 -->
  <div id="scale-container">
    <div id="game-screen">

      <!-- 상단 상태바 -->
      <header id="status-bar">
        <div class="resources">
          <span class="resource">🍎 1250</span>
          <span class="resource">⚡ 85</span>
          <span class="resource">🦠 42</span>
        </div>
        <div class="music-controls">
          <button class="music-btn" id="musicToggle" title="Play/Pause Music">⏸️</button>
        </div>
      </header>

      <!-- 게임 영역 -->
      <main id="game-area">
        <div class="canvas-container">
          <canvas id="pathCanvas"></canvas>
          <canvas id="emojiCanvas"></canvas>
          <!-- Towers will be rendered via WebGL2 on the canvas -->
        </div>
      </main>

      <!-- 하단 슬라이드업 메뉴 -->
      <aside id="bottom-sheet">
    <div class="sheet-handle" id="sheetHandle"></div>

    <div class="sheet-header" id="sheetHeader">
      <h3 class="sheet-title">💥 TOWER MENU</h3>
      <p class="sheet-subtitle">Tap to expand</p>
    </div>

    <div class="sheet-content">
      <!-- 타워 상세 정보 -->
      <div class="detail-header">
        <div class="tower-icon-large">🧪</div>
        <div class="tower-title">
          <h2>효소 분사기</h2>
          <p class="tower-subtitle">Lv 3 • 탄수화물 분해 특화</p>
        </div>
      </div>

      <div class="stats-list">
        <div class="stat-row">
          <span class="stat-icon">⚔️</span>
          <span class="stat-name">공격력</span>
          <span class="stat-bar">
            <span class="stat-fill" style="width: 60%"></span>
          </span>
          <span class="stat-number">45</span>
        </div>
        <div class="stat-row">
          <span class="stat-icon">⚡</span>
          <span class="stat-name">공격속도</span>
          <span class="stat-bar">
            <span class="stat-fill" style="width: 80%"></span>
          </span>
          <span class="stat-number">1.2초</span>
        </div>
        <div class="stat-row">
          <span class="stat-icon">📍</span>
          <span class="stat-name">범위</span>
          <span class="stat-bar">
            <span class="stat-fill" style="width: 40%"></span>
          </span>
          <span class="stat-number">2타일</span>
        </div>
        <div class="stat-row">
          <span class="stat-icon">✨</span>
          <span class="stat-name">분해효과</span>
          <span class="stat-bar special">
            <span class="stat-fill" style="width: 75%"></span>
          </span>
          <span class="stat-number">+15%</span>
        </div>
      </div>

      <div class="action-section">
        <h3>🏗️ 타워 설치</h3>
        <div class="tower-grid">
          <div class="tower-card">
            <div class="tower-icon-medium">🧪</div>
            <div class="tower-card-name">효소</div>
            <div class="tower-card-cost">🍎 100</div>
          </div>
          <div class="tower-card">
            <div class="tower-icon-medium">💧</div>
            <div class="tower-card-name">위산</div>
            <div class="tower-card-cost">🍎 150</div>
          </div>
          <div class="tower-card">
            <div class="tower-icon-medium">💛</div>
            <div class="tower-card-name">담즙</div>
            <div class="tower-card-cost">🍎 200</div>
          </div>
          <div class="tower-card locked">
            <div class="tower-icon-medium">🦠</div>
            <div class="tower-card-name">유산균</div>
            <div class="tower-card-cost">🦠 25</div>
            <div class="lock-badge">🔒</div>
          </div>
          <div class="tower-card">
            <div class="tower-icon-medium">🌀</div>
            <div class="tower-card-name">연동</div>
            <div class="tower-card-cost">⚡ 30</div>
          </div>
          <div class="tower-card">
            <div class="tower-icon-medium">✨</div>
            <div class="tower-card-name">흡수</div>
            <div class="tower-card-cost">🍎 120</div>
          </div>
        </div>
      </div>

      <div class="action-buttons">
        <button class="action-btn danger">🗑️ 판매</button>
        <button class="action-btn primary">✕ 닫기</button>
      </div>
    </div>
  </aside>

    </div>
  </div>

  <!-- 개발자 메뉴 -->
  <div id="dev-menu" class="dev-menu">
    <button id="dev-menu-toggle" class="dev-menu-toggle">⚙️</button>
    <div id="dev-menu-panel" class="dev-menu-panel" style="display: none;">
      <div class="dev-menu-header">개발자 도구</div>
      <button class="dev-menu-item" id="dev-path-editor">
        <span class="dev-menu-icon">📍</span>
        <span class="dev-menu-text">Path Editor</span>
        <span class="dev-menu-shortcut">Ctrl+Shift+E</span>
      </button>
      <button class="dev-menu-item" id="dev-tower-editor">
        <span class="dev-menu-icon">🗼</span>
        <span class="dev-menu-text">Tower Slot Editor</span>
      </button>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
