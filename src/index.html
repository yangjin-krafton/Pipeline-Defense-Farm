<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Digestive Run - Pipeline Defense Farm</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <!-- Start Overlay for autoplay -->
  <div class="start-overlay" id="startOverlay">
    <div class="start-content">
      <h1>🍔 Digestive Run 🍕</h1>
      <p>음식이 소화되는 여정을 따라가세요!</p>
      <button class="start-btn" id="startBtn">게임 시작</button>
      <div class="start-hint">클릭하여 음악과 함께 시작하세요</div>
    </div>
  </div>

  <!-- 스케일 컨테이너 -->
  <div id="scale-container">
    <div id="game-screen">

      <!-- 상단 상태바 -->
      <header id="status-bar">
        <div class="resources">
          <span class="resource nc-resource">🍎 <span id="ncAmount">1250</span></span>
          <div class="resource sc-resource">
            <div class="sc-bar-progress" id="scBarProgress" style="width: 0%"></div>
            <span class="sc-content">⚡ <span id="scText">40/80</span></span>
          </div>
        </div>
        <div class="controls-group">
          <div class="speed-controls">
            <button class="speed-btn active" data-speed="1" title="Normal Speed">
              <span class="speed-text">1x</span>
            </button>
            <button class="speed-btn" data-speed="2" title="2x Speed (6⚡ for 10min)">
              <span class="speed-text">2x</span>
              <span class="speed-cost">6⚡</span>
            </button>
            <button class="speed-btn" data-speed="3" title="3x Speed (12⚡ for 10min)">
              <span class="speed-text">3x</span>
              <span class="speed-cost">12⚡</span>
            </button>
          </div>
          <div class="boost-timer-container" id="boostTimerContainer" style="display: none;">
            <span class="boost-icon">⚡</span>
            <span class="boost-timer" id="boostTimer">10:00</span>
            <span class="boost-label" id="boostLabel">2x</span>
          </div>
          <div class="music-controls">
            <button class="music-btn" id="musicToggle" title="Play/Pause Music">⏸️</button>
          </div>
        </div>
      </header>

      <!-- 게임 영역 -->
      <main id="game-area">
        <div class="canvas-container">
          <canvas id="pathCanvas"></canvas>
          <canvas id="emojiCanvas"></canvas>
          <!-- Towers will be rendered via WebGL2 on the canvas -->
        </div>
      </main>

      <!-- 하단 슬라이드업 메뉴 -->
      <aside id="bottom-sheet">
        <div class="sheet-handle" id="sheetHandle"></div>

        <!-- 타워 상세 정보 (설치된 타워) -->
        <div class="sheet-content hidden" id="tower-detail">
          <!-- 타워 정보 블록 (헤더 + 스탯 통합) -->
          <div class="tower-info-block">
            <div class="tower-header">
              <div class="tower-icon-large">🧪</div>
              <div class="tower-title">
                <h2>효소 분사기</h2>
                <p class="tower-subtitle">Lv 3 • 탄수화물 분해 특화</p>
              </div>
            </div>

            <!-- 성장 정보 (XP, 성급) -->
            <div class="tower-growth-info">
              <div class="growth-row">
                <span class="growth-label">성급</span>
                <span class="growth-value" id="towerStarDisplay">⭐ 1성</span>
              </div>
              <div class="growth-row">
                <span class="growth-label">경험치</span>
                <div class="xp-bar-container">
                  <div class="xp-bar-fill" id="towerXPBar" style="width: 0%"></div>
                  <span class="xp-text" id="towerXPText">0 / 40</span>
                </div>
              </div>
            </div>

            <div class="tower-stats">
              <div class="stat-row">
                <span class="stat-icon">⚔️</span>
                <span class="stat-name">공격력</span>
                <span class="stat-bar">
                  <span class="stat-fill" style="width: 60%"></span>
                </span>
                <span class="stat-number">45</span>
              </div>
              <div class="stat-row">
                <span class="stat-icon">⚡</span>
                <span class="stat-name">공격속도</span>
                <span class="stat-bar">
                  <span class="stat-fill" style="width: 80%"></span>
                </span>
                <span class="stat-number">1.2초</span>
              </div>
              <div class="stat-row">
                <span class="stat-icon">📍</span>
                <span class="stat-name">범위</span>
                <span class="stat-bar">
                  <span class="stat-fill" style="width: 40%"></span>
                </span>
                <span class="stat-number">2타일</span>
              </div>
              <div class="stat-row">
                <span class="stat-icon">✨</span>
                <span class="stat-name">분해효과</span>
                <span class="stat-bar special">
                  <span class="stat-fill" style="width: 75%"></span>
                </span>
                <span class="stat-number">+15%</span>
              </div>
            </div>
          </div>

          <!-- 업그레이드 트리 블록 -->
          <div class="upgrade-block">
            <div class="upgrade-header">
              <h3>💥 업그레이드 트리</h3>
            </div>
            <div class="upgrade-content">
              <!-- 업그레이드 트리가 여기에 동적으로 추가됨 -->
            </div>
          </div>

          <div class="action-buttons">
            <button class="action-btn success hidden" id="upgradeStarBtn">⬆️ 승급 (NC 0, SC 0)</button>
            <button class="action-btn warning" id="rerollStatsBtn">🎲 스탯 리롤 (SC 20)</button>
            <button class="action-btn danger" id="sellBtn">🗑️ 판매</button>
            <button class="action-btn primary" id="closeBtn">✕ 닫기</button>
          </div>
        </div>

        <!-- 타워 설치 메뉴 (빈 슬롯) -->
        <div class="sheet-content hidden" id="tower-build">
          <div class="detail-header">
            <h2 style="color: #1a1a2e; font-size: 24px; text-shadow: 2px 2px 0 #e94560; font-weight: 900; width: 100%; text-align: center;">🏗️ 타워 설치</h2>
          </div>

          <div class="action-section">
            <div class="tower-grid">
              <div class="tower-card" data-tower-type="acidRail">
                <div class="tower-icon-medium">💉</div>
                <div class="tower-card-name">위산 레일</div>
                <div class="tower-card-cost">🍎 150</div>
              </div>
              <div class="tower-card" data-tower-type="enzymeCharge">
                <div class="tower-icon-medium">🔋</div>
                <div class="tower-card-name">효소 축전</div>
                <div class="tower-card-cost">🍎 180</div>
              </div>
              <div class="tower-card" data-tower-type="pierceBolt">
                <div class="tower-icon-medium">🎯</div>
                <div class="tower-card-name">관통 볼트</div>
                <div class="tower-card-cost">🍎 160</div>
              </div>
              <div class="tower-card locked">
                <div class="tower-icon-medium">🦠</div>
                <div class="tower-card-name">유산균</div>
                <div class="tower-card-cost">🦠 25</div>
                <div class="lock-badge">🔒</div>
              </div>
              <div class="tower-card locked">
                <div class="tower-icon-medium">🌀</div>
                <div class="tower-card-name">연동</div>
                <div class="tower-card-cost">⚡ 30</div>
                <div class="lock-badge">🔒</div>
              </div>
              <div class="tower-card locked">
                <div class="tower-icon-medium">✨</div>
                <div class="tower-card-name">흡수</div>
                <div class="tower-card-cost">🍎 120</div>
                <div class="lock-badge">🔒</div>
              </div>
            </div>
          </div>

          <div class="action-buttons">
            <button class="action-btn primary" id="closeBuildBtn">✕ 닫기</button>
          </div>
        </div>
      </aside>

    </div>
  </div>

  <!-- 개발자 메뉴 -->
  <div id="dev-menu" class="dev-menu">
    <button id="dev-menu-toggle" class="dev-menu-toggle">⚙️</button>
    <div id="dev-menu-panel" class="dev-menu-panel" style="display: none;">
      <div class="dev-menu-header">개발자 도구</div>
      <button class="dev-menu-item" id="dev-path-editor">
        <span class="dev-menu-icon">📍</span>
        <span class="dev-menu-text">Path Editor</span>
        <span class="dev-menu-shortcut">Ctrl+Shift+E</span>
      </button>
      <button class="dev-menu-item" id="dev-tower-editor">
        <span class="dev-menu-icon">🗼</span>
        <span class="dev-menu-text">Tower Slot Editor</span>
      </button>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
