<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Digestive Run - Pipeline Defense Farm</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <!-- Start Overlay for autoplay -->
  <div class="start-overlay" id="startOverlay">
    <div class="start-content">
      <h1>🍔 Digestive Run 🍕</h1>
      <p>음식이 소화되는 여정을 따라가세요!</p>
      <button class="start-btn" id="startBtn">게임 시작</button>
      <div class="start-hint">클릭하여 음악과 함께 시작하세요</div>
    </div>
  </div>

  <div class="badge">Digestive Run • WebGL2 Optimized</div>
  <div class="fps">FPS: --</div>

  <div class="music-controls">
    <button class="music-btn" id="musicToggle" title="Play/Pause Music">⏸️</button>
    <span class="music-label">BGM</span>
    <input type="range" class="volume-slider" id="volumeSlider"
           min="0" max="100" value="40" title="Volume">
  </div>

  <div class="wrap">
    <div class="canvas-container">
      <canvas id="pathCanvas"></canvas>
      <canvas id="emojiCanvas"></canvas>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
